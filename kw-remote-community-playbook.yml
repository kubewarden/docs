---
site:
  url: https://docs.kubewarden.io
  title: Kubewarden
  start_page: 1.0@kubewarden:en:introduction.adoc

# urls:
#   html_extension_style: drop
#   latest_version_segment: ''
#   latest_prerelease_version_segment: dev
#   latest_version_segment_strategy: replace

content:
  sources:
    - url: https://github.com/kubewarden/docs.git
      branches: [main]
      start_paths: [shared, docs/kw/version-*, docs/admc/version-*, docs/sboms/v*]

ui:
  bundle:
    url: https://github.com/rancher/product-docs-ui/blob/main/build/ui-bundle.zip?raw=true
    snapshot: true
  supplemental_files: ./kw-community-docs-supp-files

asciidoc:
  attributes:
    kw-build-community: true
    build-environment: netlify
    page-pagination: ''
    tabs-sync-option: ''
  extensions:
    - '@asciidoctor/tabs'

antora:
  extensions:
    # - require: "@antora/pdf-extension"
    - require: "@antora/lunr-extension"
      index_latest_only: true
    - require: "@sntke/antora-mermaid-extension"
      mermaid_library_url: https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs # <2>
      script_stem: header-scripts
      mermaid_initialize_options:
    - require: ./product-docs-common/extensions/dynamic-loading-attributes/load-global-site-attributes.js
      attributefile: ./product-docs-common/global-attributes.yml
      enabled: true
    - require: ./product-docs-common/extensions/versions-latest-prerelease/vlp.js
      enabled: true


output:
  dir: build/site
